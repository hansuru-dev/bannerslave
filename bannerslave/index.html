<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>적중배너 생성기 v2.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/ungveloper/web-fonts/GmarketSans/font-face.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/ungveloper/web-fonts/GmarketSans/font-family.css">

<style>
:root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #4f8ef7;
    --text: #e8ecf4;
    --text-dim: #7a8499;
    --yellow: #FFCC00;
    --blue: #009EFF;
    --red: #B70630;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
}
.header-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #4f8ef7, #f7c14f);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header .ver {
    font-size: 11px; color: var(--text-dim);
    background: var(--border); padding: 2px 8px; border-radius: 20px; margin-left: 4px;
}
.header .made-by {
    font-size: 11px; color: var(--text-dim);
    margin-left: auto;
    letter-spacing: -0.01em;
}

/* LAYOUT */
.layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
}

/* SIDEBAR */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    flex-shrink: 0;
}
.sec-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim);
    padding-top: 4px;
}
.divider { height: 1px; background: var(--border); }
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-row label { font-size: 12px; color: var(--text-dim); }
input, select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 9px 11px; outline: none;
    transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

/* Color pills */
.color-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.color-pill {
    flex: 1; min-width: 48px; padding: 9px 4px; border-radius: 7px;
    border: 2px solid transparent; cursor: pointer;
    font-size: 12px; font-weight: 700; text-align: center;
    transition: all 0.15s;
}
.color-pill.pill-yellow { background: var(--yellow); color: #000; }
.color-pill.pill-blue   { background: var(--blue);   color: #fff; }
.color-pill.pill-red    { background: var(--red);    color: #fff; }
.color-pill.pill-custom {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    color: #fff; text-shadow: 0 0 3px #000;
    min-width: 48px;
}
.color-pill.active { border-color: #fff; transform: scale(1.06); box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }

/* Custom color row */
.custom-color-row {
    display: none;
    align-items: center;
    gap: 8px;
}
.custom-color-row.visible { display: flex; }
.custom-color-row input[type="color"] {
    width: 44px; height: 36px;
    padding: 2px; border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer; flex-shrink: 0;
}
.custom-color-row .color-hex {
    font-size: 13px; font-family: monospace;
    color: var(--text); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; flex: 1; outline: none;
    transition: border-color 0.15s;
}
.custom-color-row .color-hex:focus { border-color: var(--accent); }

/* Spacing slider */
.slider-row { display: flex; flex-direction: column; gap: 6px; }
.slider-row label { font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
.slider-row label span { color: var(--text); font-weight: 600; font-family: monospace; }
input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px;
    background: var(--border); outline: none; padding: 0; border: none;
    cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 0 3px rgba(79,142,247,0.25);
}

/* Download button */
.btn-download {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #4f8ef7, #3a7af0);
    border: none; border-radius: 9px; color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-download:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
.btn-download:active { transform: translateY(0); }
.btn-download:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* PREVIEW AREA */
.preview-area {
    flex: 1;
    padding: 28px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
}
.preview-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.preview-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
}
.preview-label::before {
    content:''; width:3px; height:12px;
    background: var(--accent); border-radius:2px; display:block;
}
.preview-label .size-tag {
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 4px; font-size: 10px;
    color: var(--text-dim); font-weight: 500; letter-spacing: 0;
}

/* === PANEL SECTION HEADERS === */
.panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.panel-title {
    font-size: 13px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
}
.panel-title .panel-icon { margin-right: 4px; }

/* ZIP bar checkboxes */
.zip-chk-group {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
}
.zip-chk-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
}
.zip-chk-label:has(input:checked) { color: var(--text); }
.zip-chk-label input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
}

/* Main content panels — always visible, stacked */
.main-panel {
    display: flex;
    flex-direction: column;
    border-bottom: 2px solid var(--border);
}
.main-panel .layout { flex: 1; }

/* ZIP download bar */
.zip-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
}
body { padding-bottom: 56px; }
.zip-bar .zip-info {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
}
.btn-zip {
    padding: 11px 28px;
    background: linear-gradient(135deg, #4f8ef7, #6a5af9);
    color: #fff;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.01em;
    white-space: nowrap;
}
.btn-zip:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
.btn-zip:active { transform: translateY(0); }
.btn-zip:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ===== KING BANNER STYLES ===== */

/* King banner container — same base as regular */
#banner-king-sc,
#banner-king-wt {
    position: relative;
    overflow: hidden;
    background-size: 100% 100%;
    background-repeat: no-repeat;
}

/* Yellow stripes at top/bottom */
#banner-king-sc .stripe-top,
#banner-king-sc .stripe-bottom,
#banner-king-wt .stripe-top,
#banner-king-wt .stripe-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: #FFCB00;
    z-index: 10;
}
/* SC: top=12, bottom=204 */
#banner-king-sc .stripe-top    { top: 12px; }
#banner-king-sc .stripe-bottom { top: 204px; }
/* WT: top=12, bottom=240 */
#banner-king-wt .stripe-top    { top: 12px; }
#banner-king-wt .stripe-bottom { top: 240px; }

/* Text elements */
#banner-king-sc .king-line1,
#banner-king-sc .king-line2,
#banner-king-sc .king-img,
#banner-king-sc .king-crown,
#banner-king-wt .king-line1,
#banner-king-wt .king-line2,
#banner-king-wt .king-img,
#banner-king-wt .king-crown {
    position: absolute;
}

/* line1: "X월 X주차 적중왕" - yellow + purple underline style from ref */
.king-line1 {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-weight: 800;
    color: #FFCB00;
    z-index: 5;
    text-shadow: 0px 4.5px 4.5px rgba(0,0,0,0.25);
    letter-spacing: -0.03em;
    line-height: 1;
}

/* line2: "XXX 분석위원" - white bold */
.king-line2 {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-weight: 800;
    color: #fff;
    z-index: 5;
    text-shadow: 0px 4.5px 4.5px rgba(0,0,0,0.25);
    letter-spacing: -0.03em;
    line-height: 1;
}

.king-img {
    z-index: 4;
    object-fit: contain;
    object-position: bottom;
}
.king-crown {
    z-index: 6;
}

/* === SCORECENTER KING 1124x220 === */
#banner-king-sc {
    width: 1124px;
    height: 220px;
    background-image: url('img/kingbg_scorecenter.png');
}
#banner-king-sc .king-line1 {
    font-size: 54px;
    left: 224px; top: 43px;
}
#banner-king-sc .king-line2 {
    font-size: 72px;
    left: 224px; top: 109px;
}
#banner-king-sc .king-img {
    left: 808px;
    width: 140px;
    height: auto;
    /* bottom edge sits on the yellow stripe at Y204 */
    bottom: calc(220px - 204px);  /* = 16px from bottom of banner */
    top: auto;
    object-fit: contain;
    object-position: bottom;
}
#banner-king-sc .king-crown {
    /* positioned relative to analyst img — set via JS */
}

/* === WISETOTO KING 952x256 === */
#banner-king-wt {
    width: 952px;
    height: 256px;
    background-image: url('img/kingbg_wisetoto.png');
}
#banner-king-wt .king-line1 {
    font-size: 60px;
    left: 58px; top: 55px;
}
#banner-king-wt .king-line2 {
    font-size: 82px;
    left: 58px; top: 133px;
}
#banner-king-wt .king-img {
    left: 716px;
    width: 160px;
    height: auto;
    /* bottom edge sits on the yellow stripe at Y240 */
    bottom: calc(256px - 240px);  /* = 16px from bottom of banner */
    top: auto;
    object-fit: contain;
    object-position: bottom;
}
#banner-king-wt .king-crown {
    /* positioned via JS */
}

/* King banner scale clips */
.clip-king-sc {
    width: calc(1124px * 0.58);
    height: calc(220px * 0.58);
    overflow: hidden; border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.clip-king-wt {
    width: calc(952px * 0.58);
    height: calc(256px * 0.58);
    overflow: hidden; border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.scale-wrap {
    transform-origin: top left;
    flex-shrink: 0;
}
.clip-sc {
    width: calc(1124px * 0.58);
    height: calc(220px * 0.58);
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.clip-wt {
    width: calc(952px * 0.58);
    height: calc(256px * 0.58);
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.scale-58 { transform: scale(0.58); }

/* ===== BANNER STYLES — must exactly match original ===== */
.banner-container {
    position: relative;
    overflow: hidden;
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
    font-weight: 700;
}

/* Background COLOR — must be applied alongside background-image */
.bg-yellow { background-color: #FFCC00; }
.bg-blue   { background-color: #009EFF; }
.bg-red    { background-color: #B70630; }
.bg-custom { background-color: #FF6600; } /* updated via JS */

/* Inner elements */
.banner-container .text-line-1,
.banner-container .text-line-2,
.banner-container .analyst-name,
.banner-container .analyst-image {
    position: absolute;
    font-weight: 700;
}
.banner-container .text-line-1,
.banner-container .text-line-2,
.banner-container .analyst-name { z-index: 5; }
.banner-container .analyst-image { z-index: 2; }

/* text-style spans */
.text-style-1, .text-style-2 { paint-order: stroke fill; }
.text-style-1 { color: #000; }
.text-style-2 { color: #fff; }

/* analyst-name */
.analyst-name {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-weight: 700;
    color: #fff;
    -webkit-text-stroke: 6px #000;
    letter-spacing: -0.03em;
    text-align: center;
    paint-order: stroke fill;
    font-size: 32px;
    line-height: 1.15;
}

/* === SCORECENTER 1124x220 === */
#banner-scorecenter {
    width: 1124px;
    height: 220px;
    background-image: url('img/bg_scorecenter.png');
}
#banner-scorecenter .text-line-1 {
    font-size: 44px;
    left: 145px;
    top: 55px;
    line-height: 1;
}
#banner-scorecenter .text-line-2 {
    font-size: 68px;
    left: 145px;
    top: 110px;
    line-height: 1;
}
#banner-scorecenter .text-style-1 {
    -webkit-text-stroke: 5px rgba(255,255,255,0.65);
    letter-spacing: -0.06em;
}
#banner-scorecenter .text-style-2 {
    -webkit-text-stroke: 7px #000;
    letter-spacing: -0.68px;
}
#banner-scorecenter .analyst-name {
    width: 260px;
    left: 755px;
    top: 45px;
}
#banner-scorecenter .analyst-image {
    width: 150px;
    height: 172.4px;
    left: 810px;
    top: 48px;
    object-fit: contain;
    object-position: bottom;
}

/* === WISETOTO 952x256 === */
#banner-wisetoto {
    width: 952px;
    height: 256px;
    background-image: url('img/bg_wisetoto.png');
}
#banner-wisetoto .text-line-1 {
    font-size: 50px;
    left: 45px;
    top: 76px;
    line-height: 1;
}
#banner-wisetoto .text-line-2 {
    font-size: 74px;
    left: 45px;
    top: 138px;
    line-height: 1;
}
#banner-wisetoto .text-style-1 {
    -webkit-text-stroke: 6px rgba(255,255,255,0.65);
    letter-spacing: -0.06em;
}
#banner-wisetoto .text-style-2 {
    -webkit-text-stroke: 7px #000;
    letter-spacing: -0.74px;
}
#banner-wisetoto .analyst-name {
    width: 260px;
    left: 678px;
    top: 45px;
}
#banner-wisetoto .analyst-image {
    width: 174px;
    height: 200px;
    left: 722px;
    top: 56px;
    object-fit: contain;
    object-position: bottom;
}
</style>
</head>

const spacingVal    = document.getElementById('spacing-val');

const colorHex      = document.getElementById('custom-color-hex');
const customStyle   = document.createElement('style');
document.head.appendChild(customStyle);

const banners = {
    sc: {
        container: document.getElementById('banner-scorecenter'),
        line1: document.querySelector('#banner-scorecenter .text-line-1'),
        line2: document.querySelector('#banner-scorecenter .text-line-2'),

        img:   document.querySelector('#banner-wisetoto .analyst-image'),
    }
};

// ── Populate analyst dropdown ──

    const opt = document.createElement('option');
    opt.value = a.id;
    opt.text  = a.name;
    analystSel.appendChild(opt);
});

// ── Update banners ──
function getLetterSpacingPx(emValue, container) {
    const fontSize = parseFloat(window.getComputedStyle(container.querySelector('.text-line-2')).fontSize);
    const em = parseFloat(emValue);
    return (em * fontSize).toFixed(2) + 'px';
}

function updateBanners() {
    const analyst = ALL_ANALYSTS.find(a => a.id === analystSel.value);
    if (!analyst) return;

    const episode = episodeInp.value.trim() || '000';
    const type    = typeSel.value;
    const odds    = oddsInp.value.trim() || '0';

    const line1Html = `<span class="text-style-1">프로토 승부식 ${episode}회차</span>`;
    const line2Html = `<span class="text-style-1">${type} </span><span class="text-style-2">${odds}배</span><span class="text-style-1"> 적중!!</span>`;
    const nameText  = `${analyst.name} 분석위원`;

    Object.values(banners).forEach(b => {
        b.line1.innerHTML = line1Html;
        b.line2.innerHTML = line2Html;
        b.name.innerText  = nameText;
        b.img.src = analyst.image;
        b.container.className = `banner-container ${currentColor}`;
    });
}

        document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentColor = pill.dataset.color;
        // Show/hide custom color row
        if (currentColor === 'bg-custom') {
            customRow.classList.add('visible');
            applyCustomColor(colorPicker.value);
        } else {
            customRow.classList.remove('visible');

        updateBanners();
    });
});

// ── Custom color picker ──

});

        updateBanners();

<script>
// ── ZIP DOWNLOAD ──
const chkHit  = document.getElementById('chk-hit');
const chkKing = document.getElementById('chk-king');
const zipBtn  = document.getElementById('zip-btn');
const zipInfo = document.getElementById('zip-info');

function updateZipInfo() {
    const hits  = chkHit.checked  ? 2 : 0;
    const kings = chkKing.checked ? 2 : 0;
    const total = hits + kings;
    if (total === 0) {
        zipInfo.textContent = '배너를 하나 이상 체크해주세요.';
    } else {
        zipInfo.textContent = `총 ${total}개 파일`;
    }
}
chkHit.addEventListener('change', updateZipInfo);
chkKing.addEventListener('change', updateZipInfo);
updateZipInfo();

zipBtn.addEventListener('click', async () => {
    if (!chkHit.checked && !chkKing.checked) {
        alert('배너를 하나 이상 체크해주세요.');
        return;
    }
    zipBtn.disabled = true;
    zipBtn.textContent = '⏳ 생성 중...';
    await document.fonts.ready;

    const opts = { backgroundColor: null, useCORS: true, scale: 1, logging: false };
    const zip  = new JSZip();
    const d    = new Date();
    const ds   = String(d.getFullYear()).slice(2) +
                 String(d.getMonth()+1).padStart(2,'0') +
                 String(d.getDate()).padStart(2,'0');

    // scale-wrap들 모아두기
    const scaleWraps = document.querySelectorAll('.scale-wrap');

    async function capture(container) {
        // scale 제거
        scaleWraps.forEach(el => el.classList.remove('scale-58'));
        await new Promise(r => setTimeout(r, 100));
        const canvas = await html2canvas(container, opts);
        // scale 복원
        scaleWraps.forEach(el => el.classList.add('scale-58'));
        return canvas;
    }

    try {
        if (chkHit.checked) {
            const analyst   = ALL_ANALYSTS.find(a => a.id === analystSel.value);
            const name      = analyst?.name || '';
            const colorText = currentColor === 'bg-custom'
                ? colorPicker.value.replace('#','')
                : currentColor.replace('bg-','');
            const c1 = await capture(banners.sc.container);
            zip.file(`${ds}_스코어센터적중배너_${colorText}_${name}.jpg`,
                c1.toDataURL('image/jpeg', 0.95).split(',')[1], { base64: true });
            const c2 = await capture(banners.wt.container);
            zip.file(`${ds}_와이즈토토적중배너_${colorText}_${name}.jpg`,
                c2.toDataURL('image/jpeg', 0.95).split(',')[1], { base64: true });
        }
        if (chkKing.checked) {
            const analyst = ALL_ANALYSTS.find(a => a.id === kingAnalystSel.value);
            const name    = analyst?.name || '';
            const month   = kingMonth.value.trim();
            const week    = kingWeek.value.trim();
            const c3 = await capture(kingBanners.sc.container);
            zip.file(`${ds}_스코어센터적중왕배너_${month}월${week}주차_${name}.jpg`,
                c3.toDataURL('image/jpeg', 0.95).split(',')[1], { base64: true });
            const c4 = await capture(kingBanners.wt.container);
            zip.file(`${ds}_와이즈토토적중왕배너_${month}월${week}주차_${name}.jpg`,
                c4.toDataURL('image/jpeg', 0.95).split(',')[1], { base64: true });
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${ds}_배너.zip`;
        link.click();
        URL.revokeObjectURL(link.href);
    } catch(e) {
        console.error(e);
        alert('다운로드 중 오류: ' + e.message);
        scaleWraps.forEach(el => el.classList.add('scale-58'));
    }
    zipBtn.disabled = false;
    zipBtn.textContent = '⬇ ZIP 다운로드';
});
</script>
